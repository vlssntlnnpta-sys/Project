<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Sellers - VLS Parfum</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background-color: #ffffff; color: #111111; }
        header { position: fixed; top: 0; left: 0; width: 100%; height: 90px; display: flex; justify-content: space-between; align-items: center; padding: 0 80px; background-color: rgba(255, 255, 255, 0.95); z-index: 1000; }
        .logo-box { display: flex; align-items: center; text-decoration: none; color: #111111; }
        .brand-title { font-family: 'Playfair Display', serif; font-size: 1.75rem; font-weight: 500; }
        section { min-height: 100vh; padding: 140px 80px 60px 80px; display: flex; flex-direction: column; }
        h2 { font-family: 'Playfair Display', serif; font-size: 5.5rem; font-weight: 400; margin-bottom: 40px; }
        .grid-layout { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; width: 100%; }
        .large-frame { width: 100%; aspect-ratio: 1/1; background-size: cover; background-position: center; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo-box"><h1 class="brand-title">VLS Parfúm</h1></a>
    </header>
    <section>
        <h2>Best Sellers</h2>
        <div class="grid-layout">
            <div class="large-frame" style="background-image: url('https://cdn.corenexis.com/files/c/5524673720.png');"></div>
            <div class="large-frame" style="background-image: url('https://cdn.corenexis.com/files/c/8989273720.png');"></div>
            <div class="large-frame" style="background-image: url('https://cdn.corenexis.com/files/c/9678286720.png');"></div>
        </div>
    </section>
</body>
</html>
