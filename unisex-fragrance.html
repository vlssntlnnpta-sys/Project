<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unisex Fragrance - VLS Parfum</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background-color: #eaeaea; color: #111111; overflow-x: hidden; scroll-behavior: smooth; }
        
        /* ==========================================================================
           HEADER NAVIGATION BAR
           ========================================================================== */
        header { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 90px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 80px; 
            background-color: rgba(255, 255, 255, 0.95); 
            z-index: 10000; 
            border-bottom: 1px solid #eeeeee;
        }
        
        .logo-box { display: flex; align-items: center; cursor: pointer; text-decoration: none; color: #111111; z-index: 10001; }
        .brand-title { font-family: 'Playfair Display', serif; font-size: 1.75rem; font-weight: 500; }
        
        .nav-right-side { display: flex; align-items: center; z-index: 10001; }
        
        .hamburger-menu { 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
            cursor: pointer; 
            padding: 10px; 
            user-select: none;
            transition: opacity 0.2s ease;
        }
        .hamburger-menu:hover { opacity: 0.6; }
        .hamburger-menu div { width: 32px; height: 2px; background-color: #111111; pointer-events: none; }

        /* ==========================================================================
           DYNAMIC SIDEBAR NAVIGATION MENU (WITH SECTION ID TARGETS)
           ========================================================================== */
        .sidebar-nav-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 99999;
            display: none; 
        }

        .sidebar-drawer {
            position: fixed;
            top: 0;
            right: 0;
            width: 320px;
            height: 100vh;
            background-color: #ffffff;
            box-shadow: -5px 0 25px rgba(0,0,0,0.15);
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            transform: translateX(100%);
            transition: transform 0.3s ease-in-out;
        }

        .sidebar-drawer.active { transform: translateX(0); }

        .sidebar-close-btn {
            align-self: flex-end;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #111111;
            margin-bottom: 20px;
        }

        .sidebar-menu-list { list-style: none; display: flex; flex-direction: column; gap: 20px; }

        .sidebar-menu-item {
            font-family: 'Poppins', sans-serif;
            font-size: 1.35rem;
            font-weight: 400;
            color: #111111;
            text-decoration: none;
            cursor: pointer;
            padding: 8px 0;
            display: block;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .sidebar-menu-item:hover { border-color: #111111; }

        /* ==========================================================================
           MAIN CONTENT AND PRODUCT LAYOUT
           ========================================================================== */
        section { min-height: 100vh; padding: 140px 80px 60px 80px; display: flex; flex-direction: column; position: relative; z-index: 1; }
        
        .title-group h2 { font-family: 'Playfair Display', serif; font-size: 5rem; font-weight: 400; margin-bottom: 10px; }
        .tag-label { display: inline-block; border: 1px solid #111111; border-radius: 50px; padding: 6px 25px; font-size: 0.9rem; margin-bottom: 60px; align-self: flex-start; }
        
        .products-grid { display: flex; flex-wrap: wrap; gap: 30px; width: 100%; justify-content: center; margin-top: 20px; }
        
        .product-card { flex: 0 1 calc(25% - 23px); min-width: 200px; max-width: 220px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .img-box { width: 100%; aspect-ratio: 1/1; position: relative; background-size: cover; background-position: center; margin-bottom: 15px; }
        
        .price-tag { position: absolute; top: 0; left: 50%; transform: translateX(-50%); background-color: #333333; color: #ffffff; padding: 4px 12px; font-size: 0.9rem; }
        
        .product-name { font-size: 0.95rem; font-weight: 500; font-style: italic; margin-bottom: 20px; height: 40px; width: 100%; }
        .action-btn { width: 100%; max-width: 150px; padding: 10px; border-radius: 50px; font-family: 'Poppins', sans-serif; font-size: 0.85rem; border: none; background-color: #444444; color: #ffffff; opacity: 0.8; cursor: not-allowed; text-align: center; }
    </style>
</head>
<body>

    <div class="sidebar-nav-overlay" id="sidebarMenuOverlay" onclick="closeNavigationDrawer()">
        <div class="sidebar-drawer" id="sidebarDrawerPanel" onclick="event.stopPropagation()">
            <button class="sidebar-close-btn" onclick="closeNavigationDrawer()"><i class="fa-solid fa-xmark"></i></button>
            <nav class="sidebar-menu-list">
                <a href="#login-screen" class="sidebar-menu-item" onclick="closeNavigationDrawer()">Log In</a>
                <a href="#home" class="sidebar-menu-item" onclick="closeNavigationDrawer()">Home Page</a>
                <a href="#categories" class="sidebar-menu-item" onclick="closeNavigationDrawer()">Categories</a>
                <a href="#account" class="sidebar-menu-item" onclick="closeNavigationDrawer()">My Profile</a>
                <a href="#about-us-section" class="sidebar-menu-item" onclick="closeNavigationDrawer()">About Us</a>
            </nav>
        </div>
    </div>

    <header>
        <a href="#home" class="logo-box">
            <h1 class="brand-title">VLS Parfúm</h1>
        </a>
        <div class="nav-right-side">
            <div class="hamburger-menu" onclick="openNavigationDrawer()" title="Open Menu">
                <div></div>
                <div></div>
                <div></div>
            </div>
        </div>
    </header>

    <section id="categories">
        <div class="title-group">
            <h2>Unisex Fragrance</h2>
            <div class="tag-label">Collection</div>
        </div>
        <div class="products-grid">
            <div class="product-card">
                <div class="img-box" style="background-image: url('https://cdn.corenexis.com/files/c/3545949720.jpg');">
                    <div class="price-tag">&#8369; 149</div>
                </div>
                <div class="product-name">Jo Malone Nectarine</div>
                <button class="action-btn" disabled>OUT OF STOCK</button>
            </div>
        </div>
    </section>

    <script>
        function openNavigationDrawer() {
            const overlay = document.getElementById('sidebarMenuOverlay');
            const panel = document.getElementById('sidebarDrawerPanel');
            overlay.style.display = 'block';
            setTimeout(() => {
                panel.classList.add('active');
            }, 10);
        }

        function closeNavigationDrawer() {
            const overlay = document.getElementById('sidebarMenuOverlay');
            const panel = document.getElementById('sidebarDrawerPanel');
            panel.classList.remove('active');
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 300);
        }
    </script>
    
</body>
</html>
